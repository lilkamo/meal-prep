<title>Fortis Meals</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0E0C09;--bg2:#171410;--card:#1C1812;--card2:#232018;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --accent:#E8A020;--accent2:#B87818;
  --abg:rgba(232,160,32,0.10);--aborder:rgba(232,160,32,0.25);
  --text:#F0EBE0;--text2:#A09880;--text3:#5A5040;
  --prot:#4A9B6A;--carb:#5580CC;--fat:#D4844A;--fib:#8A70C4;
  --pbg:rgba(74,155,106,0.10);--pborder:rgba(74,155,106,0.25);
  --fbg:rgba(138,112,196,0.10);--fborder:rgba(138,112,196,0.25);
  --rs:14px;--rx:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none;}
body{display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
.hdr{background:var(--card);border-bottom:0.5px solid var(--border2);
  padding:calc(env(safe-area-inset-top)+10px) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-logo{display:flex;align-items:center;gap:9px;}
.hdr-icon{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#E8A020,#B87818);
  display:flex;align-items:center;justify-content:center;font-size:17px;}
.hdr-name{font-size:16px;font-weight:800;letter-spacing:-0.02em;}
.hdr-sub{font-size:10px;color:var(--text3);font-weight:500;margin-top:1px;letter-spacing:0.02em;}
.unit-pill{display:flex;background:var(--bg2);border-radius:20px;padding:3px;border:0.5px solid var(--border2);}
.upill-btn{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;
  border:none;cursor:pointer;transition:all 0.15s;background:transparent;color:var(--text3);letter-spacing:0.02em;}
.upill-btn.on{background:var(--accent);color:#080808;}

/* ── TABS ── */
.tabs{padding:10px 16px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;
  scrollbar-width:none;background:var(--bg);border-bottom:0.5px solid var(--border);}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:7px 15px;border-radius:20px;font-size:12px;font-weight:700;
  border:0.5px solid var(--border2);background:var(--card);color:var(--text2);
  cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;letter-spacing:0.01em;}
.tab.on{background:var(--accent);border-color:transparent;color:#080808;}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:14px 14px calc(env(safe-area-inset-bottom)+20px);}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}

/* ── CARD ── */
.card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rs);
  overflow:hidden;cursor:pointer;transition:transform 0.12s,border-color 0.12s;
  -webkit-tap-highlight-color:transparent;}
.card:active{transform:scale(0.96);}
.card-img{height:108px;display:flex;align-items:center;justify-content:center;font-size:50px;}
.card-body{padding:9px 11px 11px;}
.card-cat{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:3px;}
.mbar{height:3px;border-radius:2px;display:flex;overflow:hidden;margin-bottom:7px;}
.mb-p{background:var(--prot);}.mb-c{background:var(--carb);}.mb-f{background:var(--fat);}
.card-name{font-size:12.5px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:7px;}
.macro-chips{display:flex;gap:4px;flex-wrap:wrap;}
.mchip{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:20px;}
.mchip-k{background:var(--abg);color:var(--accent);border:0.5px solid var(--aborder);}
.mchip-p{background:var(--pbg);color:var(--prot);border:0.5px solid var(--pborder);}
.mchip-f{background:var(--fbg);color:var(--fib);border:0.5px solid var(--fborder);}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
.ctag{font-size:8.5px;font-weight:600;padding:2px 6px;border-radius:20px;
  background:var(--bg2);color:var(--text3);border:0.5px solid var(--border);}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:100;
  display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.overlay.on{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;
  max-height:93vh;display:flex;flex-direction:column;
  transform:translateY(30px);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);}
.overlay.on .modal{transform:translateY(0);}
.m-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 0;flex-shrink:0;}
.m-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Hero */
.m-hero{height:185px;display:flex;align-items:center;justify-content:center;
  margin:10px 14px;border-radius:var(--rs);position:relative;font-size:70px;}
.m-close{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,0.45);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;z-index:5;}
.m-hero-label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;
  background:linear-gradient(transparent,rgba(0,0,0,0.65));border-radius:0 0 var(--rs) var(--rs);}
.m-hero-cat{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
  color:rgba(255,255,255,0.65);margin-bottom:2px;}
.m-hero-name{font-size:17px;font-weight:800;color:#fff;letter-spacing:-0.02em;line-height:1.2;}

/* Macros */
.m-macros{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 14px;margin:10px 0 14px;}
.mmac{background:var(--card);border-radius:var(--rx);padding:8px 6px;text-align:center;border:0.5px solid var(--border);}
.mmac-v{font-size:16px;font-weight:800;letter-spacing:-0.03em;}
.mmac-l{font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}
.mac-k{color:var(--accent);}.mac-p{color:var(--prot);}.mac-c{color:var(--carb);}
.mac-fi{color:var(--fib);}.mac-fa{color:var(--fat);}

/* Controls */
.m-ctrl{display:flex;align-items:center;gap:10px;margin:0 14px 14px;
  padding:12px 14px;background:var(--card);border-radius:var(--rs);border:0.5px solid var(--border2);}
.m-ctrl-lbl{flex:1;}
.m-ctrl-lbl-main{font-size:12px;font-weight:600;color:var(--text2);}
.m-ctrl-lbl-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.pp-ctrl{display:flex;align-items:center;gap:8px;}
.pp-btn{width:30px;height:30px;border-radius:50%;background:var(--bg2);
  border:0.5px solid var(--border2);color:var(--text);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:700;transition:background 0.1s;-webkit-tap-highlight-color:transparent;}
.pp-btn:active{background:var(--accent);color:#080808;}
.pp-count{font-size:20px;font-weight:800;color:var(--accent);min-width:28px;text-align:center;}

/* Section */
.sec-head{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;
  color:var(--text3);margin:14px 14px 7px;}
.sec-note{font-size:11px;color:var(--text3);padding:0 14px;margin-bottom:8px;line-height:1.5;}

/* Ingredients */
.ing-list{display:flex;flex-direction:column;gap:2px;padding:0 14px;}
.ing-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;
  padding:9px 11px;background:var(--card);border-radius:var(--rx);border:0.5px solid var(--border);}
.ing-name{font-size:12.5px;color:var(--text);font-weight:500;flex:1;min-width:0;}
.ing-where{font-size:9.5px;color:var(--text3);margin-top:2px;}
.ing-amt{font-size:13px;color:var(--accent);font-weight:800;flex-shrink:0;text-align:right;}

/* Steps */
.steps-list{display:flex;flex-direction:column;gap:7px;padding:0 14px;}
.step{display:flex;gap:11px;padding:11px;background:var(--card);border-radius:var(--rx);border:0.5px solid var(--border);}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#080808;
  font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-body{}
.step-t{font-size:12.5px;color:var(--text);font-weight:700;margin-bottom:3px;}
.step-tx{font-size:12px;color:var(--text2);line-height:1.6;}

/* Notes */
.m-notes{margin:14px 14px 0;padding:11px 13px;background:var(--abg);
  border:0.5px solid var(--aborder);border-radius:var(--rx);
  font-size:11.5px;color:var(--text2);line-height:1.65;}

/* Supermarkets */
.supers{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px;margin-top:6px;}
.super{font-size:10.5px;padding:4px 10px;border-radius:20px;
  background:var(--card);border:0.5px solid var(--border2);color:var(--text3);font-weight:600;}

/* Legend */
.macro-legend{display:flex;gap:12px;padding:0 14px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Spacer */
.m-space{height:28px;}
</style>
</head>

// ── State ─────────────────────────────────────────────────────────
let unit='metric';
let cat='all';
let active=null;
let people=1;

// ── Format amount ─────────────────────────────────────────────────
const NON_SCALE_UNITS=['tbsp','tsp','scoops','bunch','bunches','cans','biscuits','count'];
function fmt(raw,u){
  const v=raw*people;
  if(NON_SCALE_UNITS.includes(u)){
    const d=v%1===0?v:v.toFixed(1);
    return u==='count'?`${d}`:`${d} ${u}`;
  }
  if(unit==='metric'){
    if(u==='g'&&v>=1000) return `${+(v/1000).toFixed(1)} kg`;
    if(u==='ml'&&v>=1000) return `${+(v/1000).toFixed(1)} l`;
    const d=v%1===0?v:parseFloat(v.toFixed(1));
    return `${d} ${u}`;
  }
  // Imperial
  if(u==='g'){if(v>=453.6) return `${(v/453.6).toFixed(1)} lb`; return `${Math.round(v/28.35)} oz`;}
  if(u==='kg') return `${(v*2.205).toFixed(2)} lb`;
  if(u==='ml'){if(v>=284) return `${(v/568.3).toFixed(1)} pt`; return `${Math.round(v/29.57)} fl oz`;}
  if(u==='l') return `${(v*1.76).toFixed(1)} pt`;
  const d=v%1===0?v:parseFloat(v.toFixed(1));
  return `${d} ${u}`;
}

// ── Render grid ───────────────────────────────────────────────────
function renderGrid(){
  const g=document.getElementById('grid');
  const list=cat==='all'?MEALS:MEALS.filter(m=>m.cat===cat);
  if(!list.length){g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--text3)">No meals found</div>';return;}
  const catLabel={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner'};
  g.innerHTML=list.map(m=>{
    const total=m.macros.p+m.macros.c+m.macros.fat;
    const pp=Math.round(m.macros.p/total*100);
    const cp=Math.round(m.macros.c/total*100);
    const fp=100-pp-cp;
    return `<div class="card" onclick="openMeal('${m.id}')">
<div class="card-img" style="background:linear-gradient(135deg,${m.col[0]},${m.col[1]})">${m.emoji}</div>
<div class="card-body">
<div class="card-cat">${catLabel[m.cat]}</div>
<div class="mbar"><div class="mb-p" style="width:${pp}%"></div><div class="mb-c" style="width:${cp}%"></div><div class="mb-f" style="width:${fp}%"></div></div>
<div class="card-name">${m.name}</div>
<div class="macro-chips">
<span class="mchip mchip-k">${m.macros.kcal} kcal</span>
<span class="mchip mchip-p">${m.macros.p}g protein</span>
<span class="mchip mchip-f">${m.macros.f}g fibre</span>
</div>
<div class="card-tags">${m.tags.slice(0,2).map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
</div></div>`;
  }).join('');
}

// ── Render modal ──────────────────────────────────────────────────
function openMeal(id){
  active=MEALS.find(m=>m.id===id);
  if(!active)return;
  people=1;
  renderModal();
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow='hidden';
}

function renderModal(){
  const m=active;
  const catLabel={breakfast:'Breakfast',lunch:'Lunch',dinner:'Dinner'};
  const portionStr=`${people*5} portions · ${people} ${people===1?'person':'people'} · 1 week`;

  const ingsHtml=m.ings.map(i=>{
    const fieldN=i.n||i.name||'';
    const fieldW=i.w||i.where||'';
    const fmtVal=fmt(i.a,i.u);
    return `<div class="ing-row">
<div class="ing-name">${fieldN}${fieldW?`<div class="ing-where">${fieldW}</div>`:''}
</div><div class="ing-amt">${fmtVal}</div></div>`;
  }).join('');

  const stepsHtml=m.steps.map((s,i)=>`<div class="step">
<div class="step-n">${i+1}</div>
<div><div class="step-t">${s.t}</div><div class="step-tx">${s.x}</div></div>
</div>`).join('');

  document.getElementById('mscroll').innerHTML=`
<div class="m-hero" style="background:linear-gradient(135deg,${m.col[0]},${m.col[1]})">
  ${m.emoji}
  <button class="m-close" onclick="closeM()">✕</button>
  <div class="m-hero-label">
    <div class="m-hero-cat">${catLabel[m.cat]}${m.prep?` · ${m.prep}`:''}</div>
    <div class="m-hero-name">${m.name}</div>
  </div>
</div>

<div class="m-macros">
<div class="mmac"><div class="mmac-v mac-k">${m.macros.kcal}</div><div class="mmac-l">kcal</div></div>
<div class="mmac"><div class="mmac-v mac-p">${m.macros.p}g</div><div class="mmac-l">Protein</div></div>
<div class="mmac"><div class="mmac-v mac-c">${m.macros.c}g</div><div class="mmac-l">Carbs</div></div>
<div class="mmac"><div class="mmac-v mac-fi">${m.macros.f}g</div><div class="mmac-l">Fibre</div></div>
<div class="mmac"><div class="mmac-v mac-fa">${m.macros.fat}g</div><div class="mmac-l">Fat</div></div>
</div>

<div class="m-ctrl">
<div class="m-ctrl-lbl">
<div class="m-ctrl-lbl-main">People meal prepping for</div>
<div class="m-ctrl-lbl-sub" id="portionStr">${portionStr}</div>
</div>
<div class="pp-ctrl">
<button class="pp-btn" onclick="adj(-1)">−</button>
<div class="pp-count" id="ppCount">${people}</div>
<button class="pp-btn" onclick="adj(1)">+</button>
</div>
</div>

<div class="macro-legend">
<div class="leg-item"><div class="leg-dot" style="background:var(--prot)"></div>Protein</div>
<div class="leg-item"><div class="leg-dot" style="background:var(--carb)"></div>Carbs</div>
<div class="leg-item"><div class="leg-dot" style="background:var(--fat)"></div>Fat</div>
</div>

<div class="sec-head">Ingredients</div>
<div class="sec-note">For ${people} ${people===1?'person':'people'} · 1 week · ${people*5} portions total</div>
<div class="ing-list" id="ingList">${ingsHtml}</div>

<div class="sec-head">Method</div>
<div class="steps-list">${stepsHtml}</div>

${m.notes?`<div class="m-notes">📝 ${m.notes}</div>`:''}

<div class="sec-head">Find it at</div>
<div class="supers">${m.shops.map(s=>`<span class="super">${s}</span>`).join('')}</div>

<div class="m-space"></div>`;
}

function adj(d){
  people=Math.max(1,Math.min(10,people+d));
  renderModal();
}

function closeM(e){
  if(e&&e.target!==document.getElementById('ov'))return;
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow='';
  active=null;
}

// ── Controls ──────────────────────────────────────────────────────
function setUnit(u){
  unit=u;
  document.querySelectorAll('.upill-btn').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase().includes(u==='metric'?'metric':'imperial')));
  if(active)renderModal();
}

function setCat(c){
  cat=c;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.c===c));
  renderGrid();
}

// ── Init ──────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
